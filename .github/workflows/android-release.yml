name: Android Release

# ============================================================================
# 职责：构建 Android APK，签名并发布到 GitHub Release
# ============================================================================
# 触发条件：
# - 手动触发（workflow_dispatch）+ 指定版本号
# - tag 推送 v*.*.* （自动触发，与 Desktop 共用 tag）
#
# 最小化约束原则：
# - 仅在显式发布时触发（手动或 tag），不影响日常推送
# - 不做 PR 检查
# - 仅生成 APK（不上传 Google Play，无 AAB）
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 3.7.0，不带 v 前缀）'
        required: true
        type: string
      version_code:
        description: '版本号整数（versionCode，需比上次大，默认自增）'
        required: false
        type: string
      prerelease:
        description: '标记为预发布'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

# 同一版本仅允许一个发布任务
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION_CODE="${{ github.event.inputs.version_code }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION_CODE=""
          fi

          # 若未指定 versionCode，从上次 release 提取并自增
          if [ -z "$VERSION_CODE" ]; then
            LAST_CODE=$(gh release list --limit 5 --json tagName,name 2>/dev/null | \
              jq -r '.[].tagName' | grep -oE 'android-v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | \
              sed 's/android-v//g' || echo "")
            # 简化：使用日期作为 versionCode（YYYYMMDD0 格式）
            VERSION_CODE=$(date -u +"%Y%m%d0")
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=android-v$VERSION" >> $GITHUB_OUTPUT
          echo "[android-release] 版本: $VERSION, versionCode: $VERSION_CODE"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        # 单独步骤安装 SDK 包：android-actions/setup-android@v3 的 packages 多行参数
        # 与新版 cmdline-tools 16.0 不兼容（包名被换行符拼接为单个字符串）
        # SDK 37 (Android 17) 需要通过 --channel=1 (beta) 渠道安装，stable 渠道尚未发布
        # core-ktx 1.19.0 要求 compileSdk >= 37，不能降级到 SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --channel=1 "platforms;android-37" "build-tools;37.0.0"
          echo "[android-release] SDK 包安装完成"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Sync content/mobile/ to Android assets
        shell: bash
        run: |
          # 同步 content/mobile/ 到 android/app/src/main/assets/dist-mobile/
          # （Android 端使用 Markdown 文件 + JSON 索引存储文档）
          if [ -d "content/mobile" ]; then
            mkdir -p android/app/src/main/assets/dist-mobile/docs
            # 清空旧内容
            rm -rf android/app/src/main/assets/dist-mobile/docs/* 2>/dev/null || true
            # 同步新内容
            cp -r content/mobile/* android/app/src/main/assets/dist-mobile/docs/
            echo "[android-release] 已同步 content/mobile/ 到 dist-mobile/docs/"

            # 重新生成 index.json（如果存在生成脚本）
            # TODO: 待 Android 端实现 index.json 生成逻辑后补充
          else
            echo "[android-release] 警告：content/mobile/ 目录不存在，使用现有 assets"
          fi

      - name: Update version in build.gradle.kts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          # 更新 android/app/build.gradle.kts 中的 appVersionName 与 appVersionCode
          sed -i "s/^val appVersionName = .*/val appVersionName = \"${VERSION}\"/" android/app/build.gradle.kts
          sed -i "s/^val appVersionCode = .*/val appVersionCode = ${VERSION_CODE}/" android/app/build.gradle.kts
          echo "[android-release] build.gradle.kts 版本已更新："
          grep -E "^val appVersion" android/app/build.gradle.kts

      - name: Restore Android keystore from Secret
        shell: bash
        env:
          # keystore 文件以 base64 编码存入 Secret，CI 中解码还原为 android/fandex-release.jks
          FANDEX_KEYSTORE_BASE64: ${{ secrets.FANDEX_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$FANDEX_KEYSTORE_BASE64" ]; then
            echo "[android-release] 错误：Secret FANDEX_KEYSTORE_BASE64 未配置"
            echo "[android-release] 请参阅 docs/SECRETS.md 了解如何生成与配置 keystore"
            exit 1
          fi
          echo "$FANDEX_KEYSTORE_BASE64" | base64 -d > android/fandex-release.jks
          chmod 600 android/fandex-release.jks
          echo "[android-release] keystore 已还原: android/fandex-release.jks"
          ls -la android/fandex-release.jks

      - name: Build release APK
        working-directory: android
        env:
          # 签名密钥（通过 Secrets 注入）
          FANDEX_KEYSTORE_PASSWORD: ${{ secrets.FANDEX_KEYSTORE_PASSWORD }}
          FANDEX_KEY_PASSWORD: ${{ secrets.FANDEX_KEY_PASSWORD }}
          FANDEX_KEY_ALIAS: ${{ secrets.FANDEX_KEY_ALIAS }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: List build artifacts
        shell: bash
        run: |
          echo "[android-release] 构建产物清单："
          find android/app/build/outputs/apk/release -type f 2>/dev/null || true

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets

          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "release-assets/FANDEX-v${VERSION}-android.apk"
            echo "apk_path=release-assets/FANDEX-v${VERSION}-android.apk" >> $GITHUB_OUTPUT

            # 计算 SHA-256
            SHA256=$(sha256sum "release-assets/FANDEX-v${VERSION}-android.apk" | cut -d' ' -f1)
            echo "$SHA256  FANDEX-v${VERSION}-android.apk" > "release-assets/FANDEX-v${VERSION}-android.apk.sha256"
            echo "sha256_path=release-assets/FANDEX-v${VERSION}-android.apk.sha256" >> $GITHUB_OUTPUT

            echo "[android-release] APK SHA-256: $SHA256"
          fi

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FANDEX Android v${{ steps.version.outputs.version }}
          body: |
            # FANDEX Android v${{ steps.version.outputs.version }}

            ## 下载

            - Android APK：`FANDEX-v${{ steps.version.outputs.version }}-android.apk`
            - SHA-256 校验：`FANDEX-v${{ steps.version.outputs.version }}-android.apk.sha256`

            ## 安装

            1. 下载 APK 文件
            2. 在手机设置中允许"安装未知来源应用"
            3. 点击 APK 文件安装

            ## 更新说明

            - 见 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/android/CHANGELOG.md)
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            release-assets/FANDEX-v${{ steps.version.outputs.version }}-android.apk
            release-assets/FANDEX-v${{ steps.version.outputs.version }}-android.apk.sha256
