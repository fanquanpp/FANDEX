name: Content Manifest

# ============================================================================
# 职责：扫描 content/ 目录，生成并签名 manifest（full + mobile）
# ============================================================================
# 触发条件：
# - push 到 main 分支，且 content/ tools/ shared/ 或 id-registry 等关键文件变化
# - 手动触发（用于调试或强制重生成）
#
# 最小化约束原则：
# - 不阻止任何推送，仅在后置阶段生成 manifest
# - 不做 PR 检查（PR 检查由开发者本地保证）
# - 不触发应用构建（应用构建由 release workflow 处理）
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'tools/**'
      - 'shared/**'
      - 'id-registry.json'
      - 'doc-id-map-full.json'
      - 'doc-id-map-mobile.json'
      - '.github/workflows/content-manifest.yml'
  workflow_dispatch:
    inputs:
      force_resign:
        description: '强制重新签名（即使 manifest 内容未变化）'
        required: false
        type: boolean
        default: false

# 同一时间仅允许一个 manifest 生成任务运行，避免并发覆盖
concurrency:
  group: content-manifest
  cancel-in-progress: false

# 最小权限原则
permissions:
  contents: write      # 需要推送 manifest 到 gh-pages 分支
  pages: write         # 需要部署到 GitHub Pages
  id-token: write      # Pages 部署需要 OIDC

jobs:
  build-manifest:
    name: Build & Sign Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以计算文件 sha256 与 mtime

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'tools/package-lock.json'

      - name: Install tools dependencies
        working-directory: tools
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: tools
        run: npm run typecheck

      - name: Generate unsigned full manifest
        working-directory: tools
        run: |
          npx tsx src/generate-manifest.ts \
            --type full \
            --app-compat-version "3.0.0"

      - name: Generate unsigned mobile manifest
        working-directory: tools
        run: |
          npx tsx src/generate-manifest.ts \
            --type mobile \
            --app-compat-version "3.7.0"

      - name: Sign full manifest
        working-directory: tools
        env:
          FANDEX_PRIVATE_KEY: ${{ secrets.FANDEX_PRIVATE_KEY }}
          FANDEX_PUBLIC_KEY: ${{ secrets.FANDEX_PUBLIC_KEY }}
        run: |
          npx tsx src/sign-manifest.ts --type full
          npx tsx src/sign-manifest.ts --type mobile

      - name: Verify signatures
        working-directory: tools
        env:
          FANDEX_PUBLIC_KEY: ${{ secrets.FANDEX_PUBLIC_KEY }}
        run: |
          npx tsx src/verify-manifest.ts --type full
          npx tsx src/verify-manifest.ts --type mobile

      - name: Prepare manifest artifact
        run: |
          mkdir -p artifact/manifests
          mkdir -p artifact/archives
          cp dist/manifests/*.json artifact/manifests/

          # 归档当前版本（带时间戳）
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          for type in full mobile; do
            if [ -f "dist/manifests/${type}.manifest.json" ]; then
              cp "dist/manifests/${type}.manifest.json" \
                 "artifact/archives/${type}.manifest.${TIMESTAMP}.json"
            fi
          done

          # 生成 manifest 索引
          node -e "
            const fs = require('fs');
            const path = require('path');
            const index = {
              generated_at: new Date().toISOString(),
              latest: {},
              archives: { full: [], mobile: [] }
            };
            for (const type of ['full', 'mobile']) {
              const latestPath = \`artifact/manifests/\${type}.manifest.json\`;
              if (fs.existsSync(latestPath)) {
                const m = JSON.parse(fs.readFileSync(latestPath, 'utf-8'));
                index.latest[type] = {
                  manifest_version: m.manifest_version,
                  generated_at: m.generated_at,
                  app_compat_version: m.app_compat_version
                };
              }
            }
            fs.writeFileSync('artifact/index.json', JSON.stringify(index, null, 2));
          "

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ github.run_id }}
          path: artifact/
          retention-days: 30

      - name: Deploy to GitHub Pages branch
        if: github.ref == 'refs/heads/main'
        run: |
          # 克隆 gh-pages 分支（如不存在则创建空分支）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # 部署 manifest 文件
          mkdir -p manifests
          cp artifact/manifests/*.json manifests/
          cp artifact/index.json manifests/index.json

          git add manifests/
          git commit -m "chore(manifest): update signed manifest [skip ci]

          Generated from commit ${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "No changes to commit"

          git push origin gh-pages
