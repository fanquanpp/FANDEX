name: Web Deploy

# ============================================================================
# 职责：构建 Astro 静态站点，部署到 GitHub Pages
# ============================================================================
# 触发条件：
# - push 到 main 分支，且 web/ 或 content/full/ 变化
# - 手动触发
#
# 最小化约束原则：
# - 不阻止推送，仅在后置阶段部署
# - 仅触发 Web 构建（不影响 Desktop / Android）
# - content/full/ 变化时也触发（Web 共用 full 内容）
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'content/full/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

# 同一时间仅允许一个 Web 部署任务运行
concurrency:
  group: web-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write    # Pages 部署需要 OIDC

jobs:
  build:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'

      - name: Install Web dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Sync content from content/full/ to web/src/content/docs/
        # 单仓库扁平化方案：content/full/ 为权威内容源
        # web/ 通过符号链接或同步方式引用，避免内容重复
        run: |
          # 清空 web/src/content/docs/ 下的现有模块目录（保留 content.config.ts）
          find web/src/content/docs -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} \; 2>/dev/null || true

          # 同步 content/full/ 到 web/src/content/docs/
          if [ -d "content/full" ]; then
            cp -r content/full/* web/src/content/docs/
            echo "[web-deploy] 已同步 content/full/ 到 web/src/content/docs/"
            ls web/src/content/docs/ | head -20
          else
            echo "[web-deploy] 警告：content/full/ 目录不存在，使用 web/ 内置内容"
          fi

      - name: Build Astro site
        working-directory: web
        env:
          # 构建时注入 manifest 远端地址，供客户端运行时拉取
          PUBLIC_MANIFEST_BASE_URL: "https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages/manifests"
          PUBLIC_MANIFEST_FALLBACK_URL: "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/manifests"
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
